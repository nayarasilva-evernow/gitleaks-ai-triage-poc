name: Secret scan + AI triage

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  gitleaks-and-triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks CLI
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Scan repository
        run: |
          set +e
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-path findings.json \
            --report-format json \
            --verbose
          exit 0

      - name: Ensure findings file
        run: |
          if [ ! -f findings.json ]; then
            echo "[]" > findings.json
          fi
          echo "Findings count: $(python -c "import json; print(len(json.load(open('findings.json'))))")"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install triage deps
        run: pip install -r requirements.txt

      - name: AI triage (gate)
        env:
          TRIAGE_PROVIDER: groq
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TRIAGE_MODEL: llama-3.3-70b-versatile
        run: python -m triage --findings findings.json --out triage-report.json --fail-on true_positive

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-reports
          path: |
            findings.json
            triage-report.json
            suggested_rules.toml
